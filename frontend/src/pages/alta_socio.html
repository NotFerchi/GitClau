<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../js/auth-guard.js"></script>
    <script>
        // Solo permite entrar si el rol es 'gerente', 'admin' o 'recepcion'
        protegerPagina(['gerente', 'admin', 'recepcion']);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Socio | Club Social y Deportivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/alta_socio.css">
</head>
<body>
    <header class="main-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Club Deportivo</a>
            <a href="index.html" class="btn-volver"><i data-lucide="arrow-left"></i> Volver al Inicio</a>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="form-container">
            <h2 style="color: #0f2a44; font-size: 28px;">Registro de Socio</h2>
            <p style="color: #718096; margin-bottom: 30px;">Complete los campos para generar su membresía.</p>
            <div id="alerta-exito" class="banner-exito"></div> <form id="form-alta-socio">
                <div class="section-header">Identidad</div>
                <div class="grid-layout">
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre(s) *" required>
                    <input type="text" id="apellido_paterno" name="apellido_paterno" placeholder="Apellido Paterno *" required>
                    <input type="text" id="apellido_materno" name="apellido_materno" placeholder="Apellido Materno">
                    <input type="text" id="curp" name="curp" maxlength="18" placeholder="CURP (18 caracteres) *" required>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    
                    <select id="genero" name="genero">
                        <option value="Hombre">Hombre</option>
                        <option value="Mujer">Mujer</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="section-header">Membresía y Contacto</div>
                <div class="grid-layout">
                    <select id="tipo_socio" name="tipo_socio">
                        <option value="Accionista">Accionista</option>
                        <option value="Rentista">Rentista</option>
                    </select>
                    <select id="modalidad" name="modalidad">
                        <option value="Individual">Individual</option>
                        <option value="Familiar">Familiar</option>
                    </select>
                    <input type="tel" id="telefono" name="telefono" placeholder="Teléfono">
                    <input type="email" id="email_contacto" name="email_contacto" placeholder="Email de contacto">
                    <textarea id="direccion" name="direccion" class="full-span" rows="2" placeholder="Dirección completa"></textarea>
                </div>
                <div class="section-header">Cuenta del Socio</div>
                <div class="grid-layout">
                    <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña temporal *" required>
                </div>

                <div class="section-header">Emergencia</div>
                <div class="grid-layout">
                    <input type="text" id="nombre_emergencia" name="nombre_emergencia" placeholder="Nombre de contacto">
                    <input type="tel" id="tel_emergencia" name="tel_emergencia" placeholder="Teléfono de contacto">
                </div>

                <div style="margin-top: 40px; display: flex; justify-content: flex-end; gap: 20px;">
                    <button type="submit" class="btn-registrar">Registrar Socio</button>
                </div>
            </form>
        </div>
    </main>
    <script>lucide.createIcons();</script>
    <script src="../js/alta_socio.js"></script>
</body>
</html>
