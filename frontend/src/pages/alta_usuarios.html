<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../js/auth-guard.js"></script>
    <script>
        // Solo permite entrar si el rol es 'gerente' o 'admin'
        protegerPagina(['gerente', 'admin']);    
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Usuarios Internos | Club Deportivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="../css/alta_usuarios.css">
</head>
<body>

    <header class="main-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo" style="text-decoration: none; color: #0f2a44; font-weight: 800; font-size: 24px;">Club Deportivo</a>
        </div>
    </header>

    <main class="content-wrapper" style="padding: 40px 20px;">
        <div class="modal-contenedor" style="background: white; padding: 40px; border-radius: 35px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto;">
            <div class="modal-cabecera" style="margin-bottom: 30px; position: relative;">
                <h2 style="color: #0f2a44; font-size: 28px;">Registrar Nuevo Usuario Interno</h2>
                <p style="color: #718096;">Complete los datos para registrar un nuevo empleado del club.</p>
                <a href="index.html" class="btn-cerrar" style="position: absolute; top: 0; right: 0; text-decoration: none; font-size: 30px; color: #cbd5e0;">&times;</a>
            </div>

            <form id="registro-form">
                
                <div class="seccion-formulario" style="margin-bottom: 30px;">
                    <h3 style="color: #00b4ff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">Información Personal</h3>
                    
                    <div class="fila-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="grupo-input">
                            <label>Nombres *</label>
                            <input type="text" id="nombres" placeholder="Nombre(s)" required>
                        </div>

                        <div class="grupo-input">
                            <label>Apellido Paterno *</label>
                            <input type="text" id="apellidoPaterno" placeholder="Apellido paterno" required>
                        </div>

                        <div class="grupo-input">
                            <label>Apellido Materno</label>
                            <input type="text" id="apellidoMaterno" placeholder="Apellido materno">
                        </div>

                        <div class="grupo-input">
                            <label>CURP *</label>
                            <input type="text" id="curp" placeholder="18 caracteres" maxlength="18" required>
                        </div>
                    </div>

                    <div class="fila-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="grupo-input">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Correo Electrónico *</label>
                            <input type="email" id="correo" placeholder="correo@ejemplo.com" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                        </div>
                        <div class="grupo-input">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Teléfono *</label>
                            <input type="tel" id="telefono" placeholder="443-123-4567" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                        </div>
                    </div>

                    <div class="fila-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="grupo-input">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Fecha de Nacimiento *</label>
                            <input type="date" id="fecha_nacimiento" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                        </div>
                        <div class="grupo-input">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Género *</label>
                            <select id="genero" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                                <option value="">Selecciona una opción...</option>
                                <option value="Hombre">Hombre</option>
                                <option value="Mujer">Mujer</option>
                                <option value="No especificar">No especificar</option>
                            </select>
                        </div>
                    </div>

                    <div class="grupo-input" style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 8px;">Dirección *</label>
                        <input type="text" id="direccion" placeholder="Calle, número, colonia, ciudad" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                    </div>
                </div>

                <div class="seccion-formulario" style="margin-bottom: 30px;">
                    <h3 style="color: #00b4ff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">Datos Laborales</h3>
                    
                    <div class="fila-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="grupo-input">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Rol en la Empresa *</label>
                            <select id="rol" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                                <option value="">Selecciona un rol...</option>
                                <option value="instructor">Instructor</option>
                                <option value="recepcionista">Recepcionista</option>
                                <option value="coordinador">Coordinador</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>

                        <div id="div-especialidad" class="grupo-input" style="display: none;">
                            <label style="display: block; font-weight: 700; margin-bottom: 8px;">Especialidad (Solo instructores)</label>
                            <input type="text" id="especialidad" placeholder="Ej. Natación, Pesas, Yoga" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;">
                        </div>
                    </div>

                    <div class="grupo-input">
                        <label style="display: block; font-weight: 700; margin-bottom: 8px;">Contraseña Temporal *</label>
                        <input type="password" id="contrasena" placeholder="Asigne una contraseña" style="width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px;" required>
                    </div>
                </div>

                <div class="caja-info" style="background: #f8fafd; padding: 20px; border-radius: 15px; margin-bottom: 30px; font-size: 13px; color: #718096; border-left: 4px solid #00b4ff;">
                    El estado del usuario se asignará como "Activo" automáticamente al confirmar el registro. Los campos marcados con (*) son obligatorios.
                </div>
                
                <div id="mensaje-error" style="display: none; padding: 15px; margin-bottom: 20px; border-radius: 10px; background-color: #fee2e2; color: #b91c1c;"></div>
                <div id="mensaje-exito" style="display: none; padding: 15px; margin-bottom: 20px; border-radius: 10px; background-color: #dcfce7; color: #15803d;"></div>

                <div class="acciones-formulario" style="display: flex; justify-content: flex-end; gap: 20px; align-items: center;">
                    <button type="button" class="btn-cancelar" onclick="window.location.href='index.html'" style="background: none; border: none; color: #a0aec0; font-weight: 700; cursor: pointer;">Cancelar</button>
                    <button type="submit" class="btn-registrar" style="background: #0f2a44; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer;">Registrar Usuario</button>
                </div>

            </form>
        </div>
    </main>

    <script src="../js/alta_usuarios.js"></script>
    <script>lucide.createIcons();</script>

</body>
</html>
